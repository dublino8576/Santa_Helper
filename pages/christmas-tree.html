<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles/global.css" />
    <link rel="stylesheet" href="../styles/section-headings.css" />
    <link rel="stylesheet" href="../styles/feature-cards.css" />
    <link rel="stylesheet" href="../styles/snowfall.css" />
    <link rel="stylesheet" href="../styles/tree.css" />
    <link rel="stylesheet" href="../styles/nav.css" />
    <link rel="stylesheet" href="../styles/footer.css" />
    <link rel="stylesheet" href="../styles/decorative-elements.css" />

    <title>Christmas Tree</title>
  </head>
  <body class="transparent-nav min-h-screen">
    <!-- Navigation Component (loaded dynamically) -->
    <div id="nav-placeholder"></div>
    <div class="snowfall-container"></div>

    <div
      class="christmas-tree min-h-screen bg-cover bg-center bg-no-repeat relative"
    ></div>

    <!-- Wishlist Cards Container -->
    <div id="wishlist-section" class="px-4 mt-8 mb-12 z-20">
      <div class="container mx-auto max-w-5xl">
        <div
          class="bg-white/10 backdrop-blur-lg rounded-2xl shadow-2xl p-4 border border-dashed border-white/20 border-4"
        >
          <!-- Single row horizontal scroll container -->
          <div
            id="wishlist-container"
            class="flex gap-3 sm:gap-6 overflow-x-auto pb-4 snap-x snap-mandatory scrollbar"
          ></div>
        </div>
      </div>
    </div>

    <!-- Modal for Read More -->
    <div
      id="modal-overlay"
      class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50"
    >
      <div
        class="bg-white/10 backdrop-blur-lg rounded-2xl shadow-2xl p-8 border border-white/20 max-w-lg w-11/12 relative"
      >
        <button
          id="modal-close"
          class="absolute top-4 right-4 text-white hover:text-gray-300 cursor-pointer text-2xl font-bold"
        >
          ✕
        </button>
        <h2 id="modal-title" class="text-3xl font-bold text-white mb-4"></h2>
        <p
          id="modal-description"
          class="text-gray-200 text-lg leading-relaxed"
        ></p>
      </div>
    </div>
    <!-- Footer Component (loaded dynamically) -->
    <div id="footer-placeholder"></div>
    <script src="../scripts/snowfall.js"></script>
    <script src="../scripts/wishlist.js"></script>
    <script src="../scripts/component-loader.js"></script>
  </body>
</html>
